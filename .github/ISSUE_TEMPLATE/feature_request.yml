name: Feature Request / Enhancement
description: Suggest an improvement to make PiggieSlicer better
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to describe a PiggieSlicer improvement.
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this feature request?
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    attributes:
      label: Problem
      description: What problem or workflow gap would this solve?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Which printers benefit from this feature?
      multiple: true
      options:
        - Anycubic LAN
        - Klipper
        - Marlin
        - Other
        - All
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: What should PiggieSlicer do?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered?
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional context
      description: Add screenshots, diagrams, or other context here.
    validations:
      required: false

name: Bug Report
description: File a PiggieSlicer bug report
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Thank you for using PiggieSlicer and reporting a bug.**

        Please search existing issues before filing a new one. If you are asking for a new workflow or UI behavior, use the feature request template instead.
  - type: checkboxes
    attributes:
      label: Is this issue reproducible in the latest nightly build?
      description: >
        Please verify this issue still happens in the latest nightly build first. It may already be fixed there:
        [Nightly builds](https://github.com/OrcaSlicer/OrcaSlicer/releases/tag/nightly-builds).
      options:
        - label: I have checked the latest nightly build and the issue is still reproducible
          required: true
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this problem?
      options:
        - label: I have searched the existing issues
          required: true
  - type: input
    id: version
    attributes:
      label: PiggieSlicer Version
      description: Which version of PiggieSlicer are you running? Check `Help` -> `About PiggieSlicer`.
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os_type
    attributes:
      label: Operating System
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: printer
    attributes:
      label: Printer
      description: Which printer/profile was selected?
      placeholder: Anycubic Kobra 3, Anycubic Kobra S1, Prusa MK4, Voron 2.4, etc.
    validations:
      required: true
  - type: textarea
    id: reproduce_steps
    attributes:
      label: How to reproduce
      description: List the exact steps that trigger the problem.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: actual_results
    attributes:
      label: Actual results
      description: What happened? Screenshots or recordings help for UI issues.
    validations:
      required: true
  - type: textarea
    id: expected_results
    attributes:
      label: Expected results
      description: What should have happened?
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Please attach a zipped project file and relevant logs when possible.

        Common log locations:
        - Windows: `%APPDATA%\PiggieSlicer\log`
        - macOS: `$HOME/Library/Application Support/PiggieSlicer/log`
        - Linux: `$HOME/.config/PiggieSlicer/log`
  - type: textarea
    id: file_uploads
    attributes:
      label: Project file and logs
      description: Drop zipped project files, debug logs, screenshots, or recordings here.
    validations:
      required: false
  - type: textarea
    id: anything_else
    attributes:
      label: Anything else?
      description: Add any other context that may help.
    validations:
      required: false
